; QueueWatch — PlatformIO project for Waveshare ESP32-C6-LCD-1.47
; Board: ESP32-C6 Dev Module, 172×320 ST7789 display
;
; Uses pioarduino platform which bundles Arduino ESP32 3.x on IDF 5.x.
; The official espressif32 registry still ships IDF 4.4.7 (no C6 support).
[env:esp32-c6-devkitc-1]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino

; 160 MHz is the stable operating frequency for ESP32-C6
board_build.f_cpu = 160000000L
; Waveshare board uses DIO flash mode (not QIO — QIO lines are not connected)
board_build.flash_mode = dio
board_build.f_flash = 40000000L
; 8 MB flash — use a 3 MB app partition (no OTA needed for this device)
board_build.partitions = huge_app.csv

monitor_speed = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    ; ESP32-C6 has only USB-Serial/JTAG — route Serial to USB so logs reach the port
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; LV_CONF_INCLUDE_SIMPLE makes LVGL search for lv_conf.h on the include path.
    ; PROJECT_DIR (root) is where lv_conf.h lives; PROJECT_SRC_DIR for our headers.
    -DLV_CONF_INCLUDE_SIMPLE
    -I"${PROJECT_DIR}"
    -I"${PROJECT_SRC_DIR}"

lib_deps =
    lvgl/lvgl @ ^8.3.11
    bblanchon/ArduinoJson @ ^6.21.5

; Upload at a high baud rate; lower if you see flash errors
upload_speed = 921600
